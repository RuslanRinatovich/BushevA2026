<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>FurnitureFactory | Пользователи</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .content-card {
            border-radius: 20px;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .btn-custom {
            border-radius: 10px;
            padding: 8px 16px;
            transition: all 0.3s;
        }
        .btn-custom:hover {
            transform: translateY(-2px);
        }
        .table th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
        }
        .badge-director {
            background: #dc3545;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
        }
        .badge-master {
            background: #fd7e14;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
        }
        .badge-keeper {
            background: #28a745;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
        }
        .badge-unknown {
            background: #6c757d;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
        }
        .status-active {
            color: #28a745;
            font-weight: bold;
        }
        .status-inactive {
            color: #dc3545;
            font-weight: bold;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="/dashboard">
            <i class="bi bi-people"></i> FurnitureFactory
        </a>
        <div class="d-flex gap-3">
            <a href="/dashboard" class="text-light text-decoration-none">
                <i class="bi bi-speedometer2"></i> Дашборд
            </a>
            <a href="/logout" class="btn btn-outline-light btn-sm">
                <i class="bi bi-box-arrow-right"></i> Выйти
            </a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="content-card p-4">
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap">
            <div>
                <h2 class="mb-0"><i class="bi bi-shield-lock text-primary"></i> Пользователи</h2>
                <p class="text-muted mb-0">Управление учётными записями</p>
            </div>
            <div>
                <a href="/admin/users/create" class="btn btn-primary btn-custom">
                    <i class="bi bi-plus-circle"></i> Новый пользователь
                </a>
            </div>
        </div>

        <!-- Сообщения -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <i class="bi bi-check-circle"></i> <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <i class="bi bi-exclamation-triangle"></i> <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Таблица пользователей -->
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Логин</th>
                    <th>Полное имя</th>
                    <th>Роль</th>
                    <th>Статус</th>
                    <th>Действия</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${users}">
                    <td th:text="${u.id}">1</td>
                    <td><strong th:text="${u.username}">admin</strong></td>
                    <td th:text="${u.fullName}">Администратор</td>
                    <td>
                            <span th:if="${u.role == 'DIRECTOR'}" class="badge-director">
                                <i class="bi bi-star-fill"></i> Директор
                            </span>
                        <span th:if="${u.role == 'MASTER'}" class="badge-master">
                                <i class="bi bi-gear"></i> Мастер
                            </span>
                        <span th:if="${u.role == 'STOREKEEPER'}" class="badge-keeper">
                                <i class="bi bi-box"></i> Кладовщик
                            </span>
                        <span th:if="${u.role != 'DIRECTOR' and u.role != 'MASTER' and u.role != 'STOREKEEPER'}" class="badge-unknown">
                                <i class="bi bi-question-circle"></i> <span th:text="${u.role}">Неизвестно</span>
                            </span>
                    </td>
                    <td>
                            <span th:if="${u.enabled}" class="status-active">
                                <i class="bi bi-check-circle-fill"></i> Активен
                            </span>
                        <span th:unless="${u.enabled}" class="status-inactive">
                                <i class="bi bi-x-circle-fill"></i> Заблокирован
                            </span>
                    </td>
                    <td>
                        <a th:href="@{/admin/users/edit/{id}(id=${u.id})}" class="btn btn-sm btn-outline-primary me-1">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <a th:href="@{/admin/users/delete/{id}(id=${u.id})}" class="btn btn-sm btn-outline-danger"
                           onclick="return confirm('Удалить пользователя?')">
                            <i class="bi bi-trash"></i>
                        </a>
                    </td>
                </tr>
                <tr th:if="${users.isEmpty()}">
                    <td colspan="6" class="text-center py-4">
                        <i class="bi bi-people fs-1 text-muted"></i>
                        <p class="text-muted mt-2 mb-0">Пользователи не найдены</p>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
