<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>FurnitureFactory | Пользователь</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .form-card {
            border-radius: 20px;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: none;
        }
        .form-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px 20px 0 0;
            padding: 20px;
            color: white;
        }
        .form-control, .form-select {
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            padding: 12px 15px;
            transition: all 0.3s;
        }
        .form-control:focus, .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
            outline: none;
        }
        .btn-custom {
            border-radius: 10px;
            padding: 10px 24px;
            font-weight: 500;
            transition: all 0.3s;
        }
        .btn-custom:hover {
            transform: translateY(-2px);
        }
        .form-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        .required-field::after {
            content: "*";
            color: #dc3545;
            margin-left: 4px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="/dashboard">FurnitureFactory</a>
        <a href="/admin/users" class="btn btn-outline-light btn-sm">Назад</a>
    </div>
</nav>

<div class="container mt-4 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="form-card">
                <div class="form-header">
                    <h3 class="mb-0">
                        <i class="bi" th:class="${user.id} ? 'bi-pencil-square' : 'bi-person-plus'"></i>
                        <span th:text="${user.id} ? 'Редактирование' : 'Новый пользователь'"></span>
                    </h3>
                </div>

                <div class="card-body p-4">
                    <div th:if="${error}" class="alert alert-danger">
                        <i class="bi bi-exclamation-triangle"></i> <span th:text="${error}"></span>
                    </div>

                    <form th:action="@{/admin/users/save}" th:object="${user}" method="post">
                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label class="form-label required-field">Логин</label>
                            <input type="text" th:field="*{username}" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" th:class="${user.id} ? 'form-label' : 'form-label required-field'">Пароль</label>
                            <input type="password" th:field="*{password}" class="form-control"
                                   th:placeholder="${user.id} ? 'Оставьте пустым, чтобы не менять' : 'Введите пароль'">
                            <div th:if="${user.id}" class="text-muted small mt-1">
                                Оставьте пустым, чтобы сохранить текущий пароль
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label required-field">Полное имя</label>
                            <input type="text" th:field="*{fullName}" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label required-field">Роль</label>
                            <select th:field="*{role}" class="form-select" required>
                                <option th:each="r : ${roleOptions}" th:value="${r}" th:text="${r}"></option>
                            </select>
                        </div>

                        <div class="mb-3 form-check">
                            <input type="checkbox" th:field="*{enabled}" class="form-check-input">
                            <label class="form-check-label">Активен (пользователь может входить в систему)</label>
                        </div>

                        <div class="d-flex gap-3 justify-content-end mt-4">
                            <a href="/admin/users" class="btn btn-secondary btn-custom">Отмена</a>
                            <button type="submit" class="btn btn-primary btn-custom">Сохранить</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
