<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>FurnitureFactory | Материалы</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .navbar-brand {
            font-weight: bold;
            font-size: 1.5rem;
        }
        .content-card {
            border-radius: 20px;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .btn-custom {
            border-radius: 10px;
            padding: 8px 16px;
            transition: all 0.3s;
        }
        .btn-custom:hover {
            transform: translateY(-2px);
        }
        .search-box {
            border-radius: 50px;
            padding: 10px 20px;
            border: 2px solid #e0e0e0;
            transition: all 0.3s;
        }
        .search-box:focus {
            border-color: #667eea;
            box-shadow: none;
            outline: none;
        }
        .table th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
        }
        .table td {
            vertical-align: middle;
        }
        .badge-low-stock {
            background: #dc3545;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
        }
        .badge-normal {
            background: #28a745;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
        }
        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .icon-btn:hover {
            transform: scale(1.1);
        }
        .filter-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="/dashboard">
            <i class="bi bi-boxes"></i> FurnitureFactory
        </a>
        <div class="d-flex gap-3">
            <a href="/dashboard" class="text-light text-decoration-none">
                <i class="bi bi-speedometer2"></i> Дашборд
            </a>
            <a href="/logout" class="btn btn-outline-light btn-sm">
                <i class="bi bi-box-arrow-right"></i> Выйти
            </a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="content-card p-4">
        <!-- Заголовок -->
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap">
            <div>
                <h2 class="mb-0"><i class="bi bi-cubes text-primary"></i> Материалы</h2>
                <p class="text-muted mb-0">Управление сырьём и материалами</p>
            </div>
            <div>
                <div class="d-flex gap-2">
                    <a href="/materials/export/excel" class="btn btn-success btn-custom">
                        <i class="bi bi-file-excel"></i> Excel
                    </a>
                    <a href="/materials/create" class="btn btn-primary btn-custom">
                        <i class="bi bi-plus-circle"></i> Новый материал
                    </a>
                </div>
            </div>
        </div>

        <!-- Сообщения об успехе/ошибке -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle"></i> <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle"></i> <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Поиск и фильтры -->
        <div class="filter-card">
            <form method="get" action="/materials" class="row g-3 align-items-end">
                <div class="col-md-5">
                    <label class="form-label fw-bold"><i class="bi bi-search"></i> Поиск</label>
                    <input type="text" name="search" class="form-control search-box"
                           placeholder="Поиск по названию или артикулу..."
                           th:value="${search}">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold"><i class="bi bi-funnel"></i> Статус</label>
                    <select name="status" class="form-select">
                        <option value="">Все материалы</option>
                        <option value="low" th:selected="${status == 'low'}">Только ниже нормы</option>
                        <option value="normal" th:selected="${status == 'normal'}">Только в норме</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary btn-custom flex-grow-1">
                            <i class="bi bi-search"></i> Найти
                        </button>
                        <a href="/materials" class="btn btn-secondary btn-custom">
                            <i class="bi bi-arrow-repeat"></i> Сбросить
                        </a>
                    </div>
                </div>
            </form>
        </div>

        <!-- Таблица материалов -->
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Артикул</th>
                    <th>Наименование</th>
                    <th>Ед. изм.</th>
                    <th>Цена (₽)</th>
                    <th>Остаток</th>
                    <th>Мин. остаток</th>
                    <th>Статус</th>
                    <th>Действия</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="m : ${materials}" th:with="isLowStock=${m.currentBalance < m.minBalance}">
                    <td th:text="${m.id}">1</td>
                    <td><code th:text="${m.sku}">SKU001</code></td>
                    <td><strong th:text="${m.name}">ДСП</strong></td>
                    <td th:text="${m.unit}">лист</td>
                    <td th:text="${#numbers.formatDecimal(m.price, 0, 2)}">0,00</td>
                    <td th:class="${isLowStock} ? 'text-danger fw-bold' : ''"
                        th:text="${#numbers.formatDecimal(m.currentBalance, 1, 2)}">0,00</td>
                    <td th:text="${#numbers.formatDecimal(m.minBalance, 1, 2)}">0,00</td>
                    <td>
                            <span th:if="${isLowStock}" class="badge-low-stock">
                                <i class="bi bi-exclamation-triangle"></i> Ниже нормы
                            </span>
                        <span th:unless="${isLowStock}" class="badge-normal">
                                <i class="bi bi-check-circle"></i> В норме
                            </span>
                    </td>
                    <td>
                        <a th:href="@{/materials/edit/{id}(id=${m.id})}" class="btn btn-sm btn-outline-primary me-1">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <a th:href="@{/materials/delete/{id}(id=${m.id})}" class="btn btn-sm btn-outline-danger"
                           onclick="return confirm('Удалить материал?')">
                            <i class="bi bi-trash"></i>
                        </a>
                    </td>
                </tr>
                <tr th:if="${materials.isEmpty()}">
                    <td colspan="9" class="text-center py-4">
                        <i class="bi bi-inbox fs-1 text-muted"></i>
                        <p class="text-muted mt-2 mb-0">Материалы не найдены</p>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal добавления материала -->
<div class="modal fade" id="addMaterialModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-4">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title"><i class="bi bi-plus-circle"></i> Новый материал</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/materials/save}" method="post">
                <div class="modal-body">
                    <input type="hidden" name="id" value="">
                    <div class="mb-3">
                        <label class="form-label">Артикул *</label>
                        <input type="text" name="sku" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Наименование *</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Единица измерения *</label>
                        <input type="text" name="unit" class="form-control" required placeholder="лист, м.пог, кг">
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Цена (₽) *</label>
                            <input type="number" step="0.01" name="price" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Текущий остаток</label>
                            <input type="number" step="0.001" name="currentBalance" class="form-control" value="0">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Минимальный остаток</label>
                        <input type="number" step="0.001" name="minBalance" class="form-control" value="0">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
