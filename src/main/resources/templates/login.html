<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход | FurnitureFactory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .login-card {
            border-radius: 20px;
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.95);
        }
    </style>
</head>
<body class="d-flex align-items-center">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card login-card shadow-lg border-0">
                <div class="card-header bg-transparent border-0 text-center pt-4">
                    <i class="bi bi-building fs-1 text-primary"></i>
                    <h3 class="mt-2">FurnitureFactory</h3>
                    <p class="text-muted">Вход в систему учёта производства</p>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label"><i class="bi bi-person"></i> Логин</label>
                            <input type="text" class="form-control" name="username" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label class="form-label"><i class="bi bi-key"></i> Пароль</label>
                            <input type="password" class="form-control" name="password" required>
                        </div>
                        <div th:if="${param.error}" class="alert alert-danger">Неверный логин или пароль</div>
                        <div th:if="${param.logout}" class="alert alert-info">Вы вышли из системы</div>
                        <button type="submit" class="btn btn-primary w-100 py-2">Войти</button>
                    </form>
                </div>
                <div class="card-footer bg-transparent text-center text-muted small">
                    Тестовые: admin/admin123 | master/master123 | keeper/keeper123
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
