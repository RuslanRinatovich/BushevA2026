<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>FurnitureFactory | Клиент</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            min-height: 100vh;
        }
        .form-card {
            border-radius: 20px;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: none;
        }
        .form-header {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            border-radius: 20px 20px 0 0;
            padding: 20px;
            color: #333;
        }
        .form-control {
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            padding: 12px 15px;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: #fed6e3;
            box-shadow: 0 0 0 0.2rem rgba(254, 214, 227, 0.25);
            outline: none;
        }
        .btn-custom {
            border-radius: 10px;
            padding: 10px 24px;
            font-weight: 500;
            transition: all 0.3s;
        }
        .btn-custom:hover {
            transform: translateY(-2px);
        }
        .form-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        .required-field::after {
            content: "*";
            color: #dc3545;
            margin-left: 4px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="/dashboard">
            <i class="bi bi-people"></i> FurnitureFactory
        </a>
        <a href="/clients" class="btn btn-outline-light btn-sm">Назад</a>
    </div>
</nav>

<div class="container mt-4 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-7">
            <div class="form-card">
                <div class="form-header">
                    <h3 class="mb-0">
                        <i class="bi" th:class="${client.id} ? 'bi-pencil-square' : 'bi-person-plus'"></i>
                        <span th:text="${client.id} ? 'Редактирование клиента' : 'Новый клиент'"></span>
                    </h3>
                </div>

                <div class="card-body p-4">
                    <div th:if="${error}" class="alert alert-danger">
                        <i class="bi bi-exclamation-triangle"></i> <span th:text="${error}"></span>
                    </div>

                    <form th:action="@{/clients/save}" th:object="${client}" method="post">
                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label class="form-label required-field">Наименование</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="bi bi-building"></i></span>
                                <input type="text" th:field="*{name}" class="form-control" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">ИНН</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="bi bi-upc-scan"></i></span>
                                <input type="text" th:field="*{inn}" class="form-control" maxlength="12">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Телефон</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="bi bi-telephone"></i></span>
                                <input type="text" th:field="*{phone}" class="form-control" placeholder="+7 (999) 123-45-67">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Контактное лицо</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
                                <input type="text" th:field="*{contactPerson}" class="form-control">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Адрес</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="bi bi-geo-alt"></i></span>
                                <textarea th:field="*{address}" class="form-control" rows="3" placeholder="г. Москва, ул. Ленина, д.10"></textarea>
                            </div>
                        </div>

                        <div class="d-flex gap-3 justify-content-end mt-4">
                            <a href="/clients" class="btn btn-secondary btn-custom">Отмена</a>
                            <button type="submit" class="btn btn-primary btn-custom">
                                <i class="bi bi-check-circle"></i> Сохранить
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
