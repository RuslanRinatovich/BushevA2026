<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>FurnitureFactory | Клиенты</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            min-height: 100vh;
        }
        .content-card {
            border-radius: 20px;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .btn-custom {
            border-radius: 10px;
            padding: 8px 16px;
            transition: all 0.3s;
        }
        .btn-custom:hover {
            transform: translateY(-2px);
        }
        .table th {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            color: #333;
            border: none;
        }
        .search-box {
            border-radius: 50px;
            padding: 10px 20px;
            border: 2px solid #e0e0e0;
        }
        .search-box:focus {
            border-color: #fed6e3;
            box-shadow: none;
            outline: none;
        }
        .badge-supplier {
            background: #17a2b8;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
        }
        .badge-customer {
            background: #28a745;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
        }
        .badge-unknown {
            background: #6c757d;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="/dashboard">
            <i class="bi bi-people"></i> FurnitureFactory
        </a>
        <div class="d-flex gap-3">
            <a href="/dashboard" class="text-light text-decoration-none">
                <i class="bi bi-speedometer2"></i> Дашборд
            </a>
            <a href="/logout" class="btn btn-outline-light btn-sm">
                <i class="bi bi-box-arrow-right"></i> Выйти
            </a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="content-card p-4">
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap">
            <div>
                <h2 class="mb-0"><i class="bi bi-people text-primary"></i> Клиенты</h2>
                <p class="text-muted mb-0">Управление клиентской базой</p>
            </div>
            <div>
                <div class="d-flex gap-2">
                    <a href="/clients/export/excel" class="btn btn-success btn-custom">
                        <i class="bi bi-file-excel"></i> Excel
                    </a>
                    <a href="/clients/create" class="btn btn-primary btn-custom">
                        <i class="bi bi-plus-circle"></i> Новый клиент
                    </a>
                </div>
            </div>
        </div>

        <!-- Сообщения -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <i class="bi bi-check-circle"></i> <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <i class="bi bi-exclamation-triangle"></i> <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Поиск -->
        <div class="row mb-4">
            <div class="col-md-5">
                <form method="get" action="/clients" class="d-flex gap-2">
                    <input type="text" name="search" class="form-control search-box"
                           placeholder="Поиск по наименованию клиента..."
                           th:value="${search}">
                    <button type="submit" class="btn btn-primary btn-custom">
                        <i class="bi bi-search"></i>
                    </button>
                    <a href="/clients" class="btn btn-secondary btn-custom">
                        <i class="bi bi-arrow-repeat"></i>
                    </a>
                </form>
            </div>
        </div>

        <!-- Таблица клиентов -->
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Наименование</th>
                    <th>ИНН</th>
                    <th>Телефон</th>
                    <th>Контактное лицо</th>
                    <th>Адрес</th>
                    <th>Действия</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c : ${clients}">
                    <td th:text="${c.id}">1</td>
                    <td><strong th:text="${c.name}">ООО Ромашка</strong></td>
                    <td th:text="${c.inn}">771234567890</td>
                    <td th:text="${c.phone}">+7 (495) 123-45-67</td>
                    <td th:text="${c.contactPerson}">Иванов И.И.</td>
                    <td th:text="${c.address}">г. Москва, ул. Ленина, д.10</td>
                    <td>
                        <a th:href="@{/clients/edit/{id}(id=${c.id})}" class="btn btn-sm btn-outline-primary me-1">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <a th:href="@{/clients/delete/{id}(id=${c.id})}" class="btn btn-sm btn-outline-danger"
                           onclick="return confirm('Удалить клиента?')">
                            <i class="bi bi-trash"></i>
                        </a>
                    </td>
                </tr>
                <tr th:if="${clients.isEmpty()}">
                    <td colspan="7" class="text-center py-4">
                        <i class="bi bi-people fs-1 text-muted"></i>
                        <p class="text-muted mt-2">Клиенты не найдены</p>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
