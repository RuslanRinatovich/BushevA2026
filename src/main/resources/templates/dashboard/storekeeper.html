<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>FurnitureFactory | Кладовщик</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            min-height: 100vh;
        }
        .btn-custom {
            border-radius: 12px;
            padding: 12px;
        }
        .stat-card {
            border-radius: 20px;
        }
        .main-card {
            border-radius: 20px;
            background: white;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="/dashboard">
            <i class="bi bi-box-seam"></i> FurnitureFactory
        </a>
        <div class="d-flex gap-3">
            <span class="text-light"><i class="bi bi-person-circle"></i> <span th:text="${fullName}"></span></span>
            <a href="/logout" class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-right"></i> Выйти</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row mb-4">
        <div class="col-12">
            <div class="main-card p-4 shadow-sm">
                <h2><i class="bi bi-archive"></i> Здравствуйте, <span th:text="${fullName}"></span>!</h2>
                <p class="text-muted"><i class="bi bi-clipboard-check"></i> Кладовщик · Управление отгрузками</p>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-6">
            <div class="card stat-card bg-info text-white p-3">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h5>Отгрузки</h5>
                        <p class="mb-0">Оформление отгрузки готовой продукции</p>
                    </div>
                    <i class="bi bi-truck fs-1"></i>
                </div>
                <a href="/shipments" class="btn btn-light mt-3">Перейти →</a>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card stat-card bg-warning p-3">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h5>Клиенты</h5>
                        <p class="mb-0">Просмотр базы клиентов</p>
                    </div>
                    <i class="bi bi-people fs-1"></i>
                </div>
                <a href="/clients" class="btn btn-light mt-3">Перейти →</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
