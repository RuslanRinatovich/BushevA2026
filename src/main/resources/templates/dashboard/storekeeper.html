<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>FurnitureFactory | Кладовщик</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); min-height: 100vh; }
        .navbar-brand { font-weight: bold; font-size: 1.5rem; }
        .main-card { border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); background: white; }
        .btn-custom { border-radius: 10px; padding: 10px 16px; font-weight: 500; transition: all 0.3s; }
        .btn-custom:hover { transform: translateY(-2px); }
        .welcome-avatar {
            width: 60px; height: 60px;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; font-weight: bold; color: #333;
        }
        .stat-card { border-radius: 20px; transition: transform 0.3s; }
        .stat-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="/dashboard"><i class="bi bi-box-seam"></i> FurnitureFactory</a>
        <div class="d-flex gap-3">
            <span class="text-light"><i class="bi bi-person-circle"></i> <span th:text="${fullName}"></span></span>
            <a href="/logout" class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-right"></i> Выйти</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <!-- Welcome Section -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="main-card p-4">
                <div class="d-flex align-items-center gap-3">
                    <div class="welcome-avatar"><span th:text="${#strings.substring(fullName, 0, 1)}">К</span></div>
                    <div>
                        <h2 class="mb-0">Здравствуйте, <span th:text="${fullName}"></span>!</h2>
                        <p class="text-muted mb-0"><i class="bi bi-clipboard-check"></i> Кладовщик · Управление отгрузками</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Menu Cards -->
    <div class="row g-4">
        <div class="col-md-6">
            <div class="stat-card bg-info text-white p-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div><h4 class="mb-0">Отгрузки</h4><p class="text-white-50 mb-0">Оформление отгрузки готовой продукции</p></div>
                    <i class="bi bi-truck fs-1"></i>
                </div>
                <a href="/shipments" class="btn btn-light w-100">Перейти →</a>
            </div>
        </div>
        <div class="col-md-6">
            <div class="stat-card bg-warning p-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div><h4 class="mb-0">Клиенты</h4><p class="mb-0">Просмотр базы клиентов</p></div>
                    <i class="bi bi-people fs-1"></i>
                </div>
                <a href="/clients" class="btn btn-light w-100">Перейти →</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
