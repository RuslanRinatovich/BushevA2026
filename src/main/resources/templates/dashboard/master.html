<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>FurnitureFactory | Мастер цеха</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
        }
        .navbar-brand {
            font-weight: bold;
            font-size: 1.5rem;
        }
        .stat-card {
            border-radius: 15px;
            transition: transform 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .main-card {
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .btn-custom {
            border-radius: 10px;
            padding: 12px;
            font-weight: 500;
        }
        .production-badge {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="/dashboard">
            <i class="bi bi-bricks"></i> FurnitureFactory
        </a>
        <div class="d-flex gap-3">
            <span class="text-light"><i class="bi bi-person-circle"></i> <span th:text="${fullName}"></span></span>
            <a href="/logout" class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-right"></i> Выйти</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <!-- Welcome Section -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="main-card bg-white p-4">
                <h2><i class="bi bi-tools"></i> Здравствуйте, <span th:text="${fullName}"></span>!</h2>
                <p class="text-muted mb-0"><i class="bi bi-gear-fill"></i> Мастер цеха · Управление производством</p>
            </div>
        </div>
    </div>

    <!-- Stats -->
    <div class="row g-4 mb-4">
        <div class="col-md-6">
            <div class="card stat-card bg-info text-white">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6>Активные заказы</h6>
                            <h2 class="mb-0" th:text="${activeOrders}">0</h2>
                        </div>
                        <i class="bi bi-list-check fs-1"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card stat-card bg-danger text-white">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6>Материалы ниже нормы</h6>
                            <h2 class="mb-0" th:text="${lowStockMaterials}">0</h2>
                        </div>
                        <i class="bi bi-exclamation-diamond fs-1"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Actions -->
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card main-card text-center p-3 border-0 shadow-sm">
                <i class="bi bi-cubes fs-1 text-primary"></i>
                <h5 class="mt-2">Материалы</h5>
                <a href="/materials" class="btn btn-primary mt-2">Просмотр</a>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card main-card text-center p-3 border-0 shadow-sm">
                <i class="bi bi-cup-straw fs-1 text-success"></i>
                <h5 class="mt-2">Продукция</h5>
                <a href="/products" class="btn btn-success mt-2">Просмотр</a>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card main-card text-center p-3 production-badge text-white">
                <i class="bi bi-gear-wide-connected fs-1"></i>
                <h5 class="mt-2">Производство</h5>
                <a href="/production/orders" class="btn btn-light mt-2">Управление</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
