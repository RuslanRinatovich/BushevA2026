<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>FurnitureFactory | Новый заказ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
        }
        .form-card {
            border-radius: 20px;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .form-header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 20px 20px 0 0;
            padding: 20px;
            color: white;
        }
        .form-control, .form-select {
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            padding: 12px 15px;
        }
        .form-control:focus, .form-select:focus {
            border-color: #f5576c;
            box-shadow: none;
        }
        .btn-custom {
            border-radius: 10px;
            padding: 10px 24px;
        }
        .required-field::after {
            content: "*";
            color: #dc3545;
            margin-left: 4px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="/dashboard">FurnitureFactory</a>
        <a href="/production/orders" class="btn btn-outline-light btn-sm">Назад</a>
    </div>
</nav>

<div class="container mt-4 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="form-card">
                <div class="form-header">
                    <h3 class="mb-0"><i class="bi bi-plus-circle"></i> Новый производственный заказ</h3>
                </div>
                <div class="card-body p-4">
                    <div th:if="${error}" class="alert alert-danger"><span th:text="${error}"></span></div>

                    <form th:action="@{/production/order/save}" th:object="${orderDto}" method="post">
                        <div class="mb-3">
                            <label class="form-label required-field">Продукция</label>
                            <select th:field="*{productId}" class="form-select" required>
                                <option value="">-- Выберите продукцию --</option>
                                <option th:each="p : ${products}" th:value="${p.id}" th:text="${p.name}"></option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label required-field">Планируемое количество</label>
                            <input type="number" step="0.001" th:field="*{plannedQuantity}" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Плановая дата</label>
                            <input type="date" th:field="*{plannedDate}" class="form-control">
                        </div>

                        <div class="d-flex gap-3 justify-content-end mt-4">
                            <a href="/production/orders" class="btn btn-secondary btn-custom">Отмена</a>
                            <button type="submit" class="btn btn-primary btn-custom">Создать заказ</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
