<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>FurnitureFactory | Новая отгрузка</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); min-height: 100vh; }
        .form-card { border-radius: 20px; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .form-header { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); border-radius: 20px 20px 0 0; padding: 20px; }
        .form-control, .form-select { border-radius: 10px; border: 2px solid #e0e0e0; padding: 12px 15px; }
        .btn-custom { border-radius: 10px; padding: 10px 24px; }
        .required-field::after { content: "*"; color: #dc3545; margin-left: 4px; }
        .stock-info { background: #e8f5e9; border-radius: 10px; padding: 10px; margin-top: 5px; }
        .stock-warning { background: #ffebee; color: #c62828; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="/dashboard">FurnitureFactory</a>
        <a href="/shipments" class="btn btn-outline-light btn-sm">Назад</a>
    </div>
</nav>

<div class="container mt-4 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="form-card">
                <div class="form-header">
                    <h3 class="mb-0"><i class="bi bi-plus-circle"></i> Новая отгрузка</h3>
                </div>
                <div class="card-body p-4">
                    <div th:if="${error}" class="alert alert-danger">
                        <i class="bi bi-exclamation-triangle"></i> <span th:text="${error}"></span>
                    </div>

                    <form th:action="@{/shipments/save}" th:object="${shipmentDto}" method="post">
                        <div class="mb-3">
                            <label class="form-label required-field">Клиент</label>
                            <select th:field="*{clientId}" class="form-select" required>
                                <option value="">-- Выберите клиента --</option>
                                <option th:each="c : ${clients}" th:value="${c.id}" th:text="${c.name}"></option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label required-field">Продукция</label>
                            <select th:field="*{productId}" class="form-select" required id="productSelect">
                                <option value="">-- Выберите продукцию --</option>
                                <option th:each="p : ${products}" th:value="${p.id}" th:text="${p.name}"></option>
                            </select>
                            <div id="stockInfo" class="mt-2"></div>
                            <small class="text-muted">При недостатке продукции отгрузка не будет оформлена</small>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label required-field">Количество</label>
                                <input type="number" step="0.001" th:field="*{quantity}" class="form-control" required id="quantityInput">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label required-field">Цена (₽)</label>
                                <input type="number" step="0.01" th:field="*{price}" class="form-control" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Дата отгрузки</label>
                            <input type="date" th:field="*{shipmentDate}" class="form-control">
                        </div>

                        <div class="d-flex gap-3 justify-content-end mt-4">
                            <a href="/shipments" class="btn btn-secondary btn-custom">Отмена</a>
                            <button type="submit" class="btn btn-primary btn-custom">Оформить отгрузку</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    var products = /*[[${products}]]*/ [];
    var stockInfo = document.getElementById('stockInfo');
    var productSelect = document.getElementById('productSelect');
    var quantityInput = document.getElementById('quantityInput');

    function updateStockInfo() {
        var selectedId = parseInt(productSelect.value);
        var product = products.find(p => p.id === selectedId);

        if (product) {
            var balance = product.currentBalance;
            var unit = product.unit;
            var requestedQty = parseFloat(quantityInput.value) || 0;

            var warningClass = '';
            var message = '';

            if (requestedQty > 0 && requestedQty > balance) {
                warningClass = 'stock-warning';
                message = '<i class="bi bi-exclamation-triangle"></i> Внимание! Запрошено количество (' + requestedQty.toFixed(2) + ' ' + unit +
                         ') превышает остаток на складе (' + balance.toFixed(2) + ' ' + unit + ')';
            } else if (balance < 10) {
                warningClass = 'stock-warning';
                message = '<i class="bi bi-exclamation-triangle"></i> Внимание! Остаток на складе: ' + balance.toFixed(2) + ' ' + unit + ' (низкий остаток)';
            } else {
                message = '<i class="bi bi-check-circle"></i> Доступно на складе: ' + balance.toFixed(2) + ' ' + unit;
            }

            stockInfo.innerHTML = '<div class="stock-info ' + warningClass + ' p-2 rounded">' + message + '</div>';
        } else {
            stockInfo.innerHTML = '';
        }
    }

    if (productSelect) {
        productSelect.addEventListener('change', updateStockInfo);
    }
    if (quantityInput) {
        quantityInput.addEventListener('input', updateStockInfo);
    }
</script>

</body>
</html>
