<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>FurnitureFactory | Отгрузки</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); min-height: 100vh; }
        .content-card { border-radius: 20px; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-custom { border-radius: 10px; padding: 8px 16px; transition: all 0.3s; }
        .btn-custom:hover { transform: translateY(-2px); }
        .table th { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); color: #333; border: none; }
        .search-box { border-radius: 50px; padding: 10px 20px; border: 2px solid #e0e0e0; }
        .search-box:focus { border-color: #fed6e3; box-shadow: none; outline: none; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="/dashboard"><i class="bi bi-truck"></i> FurnitureFactory</a>
        <div class="d-flex gap-3">
            <a href="/dashboard" class="text-light text-decoration-none"><i class="bi bi-speedometer2"></i> Дашборд</a>
            <a href="/logout" class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-right"></i> Выйти</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="content-card p-4">
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap">
            <div>
                <h2 class="mb-0"><i class="bi bi-truck text-primary"></i> Отгрузки готовой продукции</h2>
                <p class="text-muted mb-0">Оформление отгрузки клиентам</p>
            </div>
            <div>
                <div class="d-flex gap-2">
                    <a href="/shipments/export/excel" class="btn btn-success btn-custom">
                        <i class="bi bi-file-excel"></i> Excel
                    </a>
                    <a href="/shipments/create" class="btn btn-primary btn-custom">
                        <i class="bi bi-plus-circle"></i> Новая отгрузка
                    </a>
                </div>
            </div>
        </div>

        <div th:if="${success}" class="alert alert-success"><i class="bi bi-check-circle"></i> <span th:text="${success}"></span></div>
        <div th:if="${error}" class="alert alert-danger"><i class="bi bi-exclamation-triangle"></i> <span th:text="${error}"></span></div>

        <!-- Поиск -->
        <div class="row mb-4">
            <div class="col-md-4">
                <form method="get" action="/shipments" class="d-flex gap-2">
                    <input type="text" name="search" class="form-control search-box"
                           placeholder="Поиск по №, клиенту или продукции..." th:value="${search}">
                    <button type="submit" class="btn btn-primary btn-custom"><i class="bi bi-search"></i></button>
                    <a href="/shipments" class="btn btn-secondary btn-custom"><i class="bi bi-arrow-repeat"></i></a>
                </form>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                <tr><th>№ отгрузки</th><th>Дата</th><th>Клиент</th><th>Продукция</th><th>Кол-во</th><th>Цена</th><th>Сумма</th><th>Действия</th></tr>
                </thead>
                <tbody>
                <tr th:each="s : ${shipments}">
                    <td><strong th:text="${s.shipmentNumber}">ОГ-0001</strong></td>
                    <td th:text="${#temporals.format(s.shipmentDate, 'dd.MM.yyyy')}">01.01.2025</td>
                    <td th:text="${s.client.name}">Клиент</td>
                    <td th:text="${s.product.name}">Продукция</td>
                    <td th:text="${#numbers.formatDecimal(s.quantity, 1, 2)}">0</td>
                    <td th:text="${#numbers.formatDecimal(s.price, 0, 2)}">0</td>
                    <td th:text="${#numbers.formatDecimal(s.totalAmount, 0, 2)}">0</td>
                    <td>
                        <form method="post" th:action="@{/shipments/delete/{id}(id=${s.id})}" style="display:inline;"
                              onsubmit="return confirm('Удалить отгрузку?')">
                            <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${shipments.isEmpty()}"><td colspan="8" class="text-center py-4"><i class="bi bi-inbox fs-1 text-muted"></i><p class="mt-2">Нет отгрузок</p></td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
