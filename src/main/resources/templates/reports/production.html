<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Производство</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); min-height: 100vh; }
        .content-card { border-radius: 20px; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .stat-card { border-radius: 15px; transition: transform 0.3s; }
        .stat-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="/dashboard"><i class="bi bi-gear-wide-connected"></i> FurnitureFactory</a>
        <a href="/dashboard" class="btn btn-outline-light btn-sm">На главную</a>
    </div>
</nav>

<div class="container mt-4">
    <div class="content-card p-4">
        <h2 class="mb-4"><i class="bi bi-graph-up"></i> Производственная статистика</h2>

        <div class="row g-4 mb-4">
            <div class="col-md-3">
                <div class="stat-card bg-secondary text-white p-3 text-center">
                    <h5>Планируется</h5>
                    <h3 th:text="${orderStats.planned}">0</h3>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card bg-warning text-dark p-3 text-center">
                    <h5>В работе</h5>
                    <h3 th:text="${orderStats.in_progress}">0</h3>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card bg-success text-white p-3 text-center">
                    <h5>Завершено</h5>
                    <h3 th:text="${orderStats.completed}">0</h3>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card bg-danger text-white p-3 text-center">
                    <h5>Отменено</h5>
                    <h3 th:text="${orderStats.cancelled}">0</h3>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-6">
                <div class="card text-center p-4">
                    <i class="bi bi-calculator fs-1 text-primary"></i>
                    <h5>Средняя себестоимость продукции</h5>
                    <h3 th:text="${#numbers.formatDecimal(averageCostPrice, 1, 2)} + ' ₽'">0 ₽</h3>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
