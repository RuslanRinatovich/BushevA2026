<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Выручка</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); min-height: 100vh; }
        .content-card { border-radius: 20px; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .stat-card { border-radius: 15px; transition: transform 0.3s; }
        .stat-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="/dashboard"><i class="bi bi-currency-ruble"></i> FurnitureFactory</a>
        <a href="/dashboard" class="btn btn-outline-light btn-sm">На главную</a>
    </div>
</nav>

<div class="container mt-4">
    <div class="content-card p-4">
        <h2 class="mb-4"><i class="bi bi-currency-ruble"></i> Финансовая статистика</h2>

        <div class="row g-4 mb-4">
            <div class="col-md-6">
                <div class="stat-card bg-success text-white p-3 text-center">
                    <h5>Выручка за сегодня</h5>
                    <h3 th:text="${#numbers.formatDecimal(todayRevenue, 1, 2)} + ' ₽'">0 ₽</h3>
                </div>
            </div>
            <div class="col-md-6">
                <div class="stat-card bg-primary text-white p-3 text-center">
                    <h5>Выручка за месяц</h5>
                    <h3 th:text="${#numbers.formatDecimal(currentMonthRevenue, 1, 2)} + ' ₽'">0 ₽</h3>
                </div>
            </div>
        </div>

        <h4 class="mt-4"><i class="bi bi-calendar"></i> Выручка по месяцам</h4>
        <table class="table table-bordered mt-3">
            <thead>
            <tr>
                <th>Месяц</th>
                <th>Выручка</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="r : ${monthlyRevenue}">
                <td th:text="${r.name}">янв 2025</td>
                <td th:text="${#numbers.formatDecimal(r.value, 1, 2)} + ' ₽'">0 ₽</td>
            </tr>
            <tr th:if="${monthlyRevenue.isEmpty()}">
                <td colspan="2" class="text-center">Нет данных</td>
            </tr>
            </tbody>
            <tfoot class="table-secondary">
            <tr>
                <td class="text-end"><strong>Итого:</strong></td>
                <td><strong th:text="${#numbers.formatDecimal(totalRevenue, 1, 2)} + ' ₽'">0 ₽</strong></td>
            </tr>
            </tfoot>
        </table>
    </div>
</div>
</body>
</html>
