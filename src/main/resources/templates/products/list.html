<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>FurnitureFactory | Продукция</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body {
        background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        min-height: 100vh;
    }
    .content-card {
        border-radius: 20px;
        background: white;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    .product-card {
        border-radius: 15px;
        transition: all 0.3s;
        cursor: pointer;
        border: 1px solid #e0e0e0;
    }
    .product-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }
    .product-image {
        width: 100%;
        height: 180px;
        object-fit: cover;
        border-radius: 15px 15px 0 0;
    }
    .badge-category {
        position: absolute;
        top: 10px;
        right: 10px;
        background: rgba(0,0,0,0.7);
        color: white;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 0.7rem;
    }
    .btn-custom {
        border-radius: 10px;
        padding: 8px 16px;
        transition: all 0.3s;
    }
    .btn-custom:hover {
        transform: translateY(-2px);
    }
    .search-box {
        border-radius: 50px;
        padding: 10px 20px;
        border: 2px solid #e0e0e0;
    }
    .search-box:focus {
        border-color: #28a745;
        box-shadow: none;
        outline: none;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark shadow-sm">
  <div class="container">
    <a class="navbar-brand" href="/dashboard">
      <i class="bi bi-cup-straw"></i> FurnitureFactory
    </a>
    <div class="d-flex gap-3">
      <a href="/dashboard" class="text-light text-decoration-none">
        <i class="bi bi-speedometer2"></i> Дашборд
      </a>
      <a href="/logout" class="btn btn-outline-light btn-sm">
        <i class="bi bi-box-arrow-right"></i> Выйти
      </a>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <div class="content-card p-4">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap">
      <div>
        <h2 class="mb-0"><i class="bi bi-cup-straw text-success"></i> Продукция</h2>
        <p class="text-muted mb-0">Управление готовой продукцией</p>
      </div>
      <div>
        <a href="/products/create" class="btn btn-success btn-custom">
          <i class="bi bi-plus-circle"></i> Новая продукция
        </a>
      </div>
    </div>

    <!-- Сообщения -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
      <i class="bi bi-check-circle"></i> <span th:text="${success}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
      <i class="bi bi-exclamation-triangle"></i> <span th:text="${error}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Поиск и фильтр -->
    <div class="row g-3 mb-4">
      <div class="col-md-6">
        <form method="get" action="/products" class="d-flex gap-2">
          <input type="text" name="search" class="form-control search-box"
                 placeholder="Поиск по названию или артикулу..."
                 th:value="${search}">
          <input type="hidden" name="categoryId" th:value="${selectedCategoryId}">
          <button type="submit" class="btn btn-success btn-custom">
            <i class="bi bi-search"></i>
          </button>
          <a href="/products" class="btn btn-secondary btn-custom">
            <i class="bi bi-arrow-repeat"></i>
          </a>
        </form>
      </div>
      <div class="col-md-4">
        <form method="get" action="/products" class="d-flex gap-2">
          <select name="categoryId" class="form-select" onchange="this.form.submit()">
            <option value="">Все категории</option>
            <option th:each="cat : ${categories}"
                    th:value="${cat.id}"
                    th:text="${cat.name}"
                    th:selected="${selectedCategoryId == cat.id}"></option>
          </select>
        </form>
      </div>
    </div>

    <!-- Карточки продукции -->
    <div class="row g-4">
      <div class="col-md-4 col-lg-3" th:each="p : ${products}">
        <div class="product-card h-100 position-relative">
          <div class="position-relative">
            <img th:src="@{/products/image/{id}(id=${p.id})}"
                 class="product-image"
                 onerror="this.src='/images/no-image.png'"/>
            <span class="badge-category" th:if="${p.category}" th:text="${p.category.name}">Категория</span>
          </div>
          <div class="p-3">
            <h6 class="mb-1" th:text="${p.name}">Название</h6>
            <small class="text-muted" th:text="${p.sku}">SKU-001</small>
            <div class="mt-2">
              <strong class="text-success fs-5" th:text="${#numbers.formatDecimal(p.sellingPrice, 1, 2)} + ' ₽'">0</strong>
            </div>
            <div class="mt-2 d-flex justify-content-between align-items-center">
              <small><i class="bi bi-box"></i> <span th:text="${#numbers.formatDecimal(p.currentBalance, 1, 2)}">0</span></small>
              <div>
                <a th:href="@{/products/edit/{id}(id=${p.id})}" class="btn btn-sm btn-outline-primary">
                  <i class="bi bi-pencil"></i>
                </a>
                <a th:href="@{/products/delete/{id}(id=${p.id})}" class="btn btn-sm btn-outline-danger"
                   onclick="return confirm('Удалить продукцию?')">
                  <i class="bi bi-trash"></i>
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div th:if="${products.isEmpty()}" class="text-center py-5">
      <i class="bi bi-inbox fs-1 text-muted"></i>
      <p class="text-muted mt-2">Продукция не найдена</p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
